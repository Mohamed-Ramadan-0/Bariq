<section class="lead-magnet">
    <div class="container">
        <div class="lead-content">
            <!-- Icon -->
            <div class="lead-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
            </div>

            <!-- Text -->
            <div class="lead-text">
                <h2 class="lead-title">{{ 'LEAD_MAGNET.TITLE' | translate }}</h2>
                <p class="lead-subtitle">{{ 'LEAD_MAGNET.SUBTITLE' | translate }}</p>
            </div>

            <!-- Form -->
            <form class="lead-form" (ngSubmit)="onSubmit()" *ngIf="!isSubmitted">
                <div class="input-wrapper">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="input-icon">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                        <polyline points="22,6 12,13 2,6"></polyline>
                    </svg>
                    <input type="email" [(ngModel)]="email" name="email"
                        [placeholder]="'LEAD_MAGNET.PLACEHOLDER' | translate" required [disabled]="isSubmitting">
                </div>
                <button type="submit" class="submit-btn" [disabled]="isSubmitting || !email">
                    <span *ngIf="!isSubmitting">{{ 'LEAD_MAGNET.CTA' | translate }}</span>
                    <span *ngIf="isSubmitting" class="loading">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" class="spinner">
                            <circle cx="12" cy="12" r="10"></circle>
                        </svg>
                    </span>
                </button>
            </form>

            <!-- Success Message -->
            <div class="success-message" *ngIf="isSubmitted">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
                <span>{{ 'LEAD_MAGNET.SUCCESS' | translate }}</span>
            </div>
        </div>
    </div>
</section>
