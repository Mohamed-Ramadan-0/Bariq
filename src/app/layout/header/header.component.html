<header [ngClass]="{'scrolled': isScrolled, 'mobile-open': isMobileMenuOpen}">
    <div class="container">
        <div class="header-inner">
            <!-- Logo -->
            <a routerLink="/" class="logo">
                <div class="logo-wrapper">
                    <app-img path="16.png" alt="Bariq Arabia Logo" [height]="50" [priority]="true"
                        containerClass="header-logo"></app-img>
                </div>
            </a>

            <!-- Desktop Navigation -->
            <nav class="desktop-nav">
                <ul class="nav-list">
                    <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
                    </li>
                    <li class="has-mega-menu">
                        <a routerLink="/services" routerLinkActive="active">Services</a>
                        <div class="mega-menu">
                            <div class="mega-menu-content">
                                <!-- Mega Menu Content Placeholder -->
                                <div class="service-item">Service 1</div>
                                <div class="service-item">Service 2</div>
                                <div class="service-item">Service 3</div>
                                <div class="service-item">Service 4</div>
                            </div>
                        </div>
                    </li>
                    <li><a routerLink="/portfolio" routerLinkActive="active">Portfolio</a></li>
                    <li><a routerLink="/blog" routerLinkActive="active">Blog</a></li>
                    <li><a routerLink="/contact" routerLinkActive="active">Contact</a></li>
                </ul>
            </nav>

            <!-- Mobile Menu Toggle -->
            <button class="hamburger-btn" [class.active]="isMobileMenuOpen" (click)="toggleMobileMenu()"
                aria-label="Toggle Navigation">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </div>
</header>

<!-- Mobile Fullscreen Overlay -->
<div class="mobile-overlay" [class.open]="isMobileMenuOpen">
    <div class="overlay-content">
        <ul class="mobile-nav-list">
            <li><a routerLink="/" (click)="toggleMobileMenu()" routerLinkActive="active"
                    [routerLinkActiveOptions]="{exact: true}">Home</a></li>
            <li>
                <button class="accordion-btn" (click)="toggleServices()" [ngClass]="{'expanded': isServicesExpanded}">
                    Services
                    <span class="arrow">&#9662;</span>
                </button>
                <div class="accordion-content" [ngClass]="{'expanded': isServicesExpanded}">
                    <!-- Example Sub-items -->
                    <a routerLink="/services" (click)="toggleMobileMenu()">All Services</a>
                    <a routerLink="/services/s1" (click)="toggleMobileMenu()">Service 1</a>
                </div>
            </li>
            <li><a routerLink="/portfolio" (click)="toggleMobileMenu()" routerLinkActive="active">Portfolio</a></li>
            <li><a routerLink="/blog" (click)="toggleMobileMenu()" routerLinkActive="active">Blog</a></li>
            <li><a routerLink="/contact" (click)="toggleMobileMenu()" routerLinkActive="active">Contact</a></li>
        </ul>
    </div>
</div>
